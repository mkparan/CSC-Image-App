<!-- activity/CSC-Activity/index.html -->
<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data: blob: http://127.0.0.1:8000 http://localhost:8000;">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CSC Image Processing</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header>
        <h1>CSC Image Processing</h1>
    </header>

    <main class="container">
        <section class="left">
            <div id="drop-area" class="drop-area">
                <p>Drag & drop an image here or <label for="file" class="browse">browse</label></p>
                <input id="file" type="file" accept="image/*" />
            </div>

            <div class="controls">
                <label for="operation">Operation</label>
                <select id="operation">
          <!-- options populated by JS -->
        </select>

                <div id="param-panel"></div>

                <button id="processBtn">Process Image</button>
                <button id="batchBtn">Batch (multi-file)</button>
            </div>
        </section>

        <section class="right">
            <div class="image-box">
                <h3>Original</h3>
                <img id="originalImg" alt="Original preview" />
            </div>

            <div class="image-box">
                <h3>Processed</h3>
                <img id="processedImg" alt="Processed preview" />
                <a id="downloadLink" href="#" download="result.png" class="download">Download</a>
            </div>
        </section>
    </main>

    <script src="renderer.js"></script>
</body>

</html>
